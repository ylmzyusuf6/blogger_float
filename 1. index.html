<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSFloat Clone</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
    <div class="logo">CSFLOAT</div>

    <div class="account active">ANA HESAP</div>
    <div class="account">HESAP 1</div>
    <div class="account">HESAP 2</div>
    <div class="account">HESAP 3</div>
    <div class="account">HESAP 4</div>
</div>

<div class="main">

    <div class="toolbar">
        <button id="buyBtn">+ BUY</button>
        <button id="sellBtn">+ SELL</button>
    </div>

    <div class="content">

        <div class="panel">
            <h3>MARKET HISTORY</h3>
            <table>
                <thead>
                <tr>
                    <th>Item</th>
                    <th>Type</th>
                    <th>Date</th>
                    <th>Buy</th>
                    <th>Sell</th>
                </tr>
                </thead>
                <tbody id="historyTable"></tbody>
            </table>
        </div>

        <div class="panel">
            <h3>INVENTORY</h3>
            <div id="inventoryList"></div>
        </div>

    </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
    <div class="modal-box">

        <h3 id="modalTitle"></h3>

        <input id="itemName" placeholder="Item adı">
        <input id="itemPrice" placeholder="Fiyat">
        <input id="itemImage" placeholder="Image URL">

        <button id="confirmBtn">CONFIRM</button>
        <button onclick="closeModal()">CANCEL</button>

    </div>
</div>

<script src="app.js"></script>
</body>
    <script>
    document.body.innerHTML = "<h1 style='color:white;background:black;padding:20px'>JS ÇALIŞIYOR ✔</h1>";
</script>
</html>
